<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <title>Best Sellers</title>
</head>
<body class="bg-gray-100">

<section class="mx-auto bg-white py-[36px] px-[24px] lg:py-[80px]">
